spring:
  application:
    name: rabbit-template
  datasource:
    url: jdbc:h2:mem:rabbitdb
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin123
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true  #ativa o retry
          max-attempts: 3  #tenta 3x
          initial-interval: 1000  #primeira tentativa aguarda 1s
          multiplier: 2.0  #cada tentativa dobra o tempo
          max-interval: 10000  #tempo maximo de espera é 10s
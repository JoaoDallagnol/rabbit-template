spring:
  application:
    name: rabbit-template
  datasource:
    url: jdbc:h2:mem:rabbitdb
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    database-platform: org.hibernate.dialect.H2Dialect
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin123
    virtual-host: /
    connection-timeout: 10000  # timeout to connect to RabbitMQ (10s)
    requested-heartbeat: 30  # heartbeat to keep connection alive (30s)
    cache:
      channel:
        size: 10  # size of the channel pool
      connection:
        size: 10  # size of the connection pool
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true  # enables retry
          max-attempts: 3  # tries 3 times
          initial-interval: 1000  # first attempt waits 1s
          multiplier: 2.0  # each attempt doubles the time
          max-interval: 10000  # maximum wait time is 10s

logging:
  level:
    org.hibernate.SQL: OFF
    org.hibernate.type.descriptor.sql.BasicBinder: OFF